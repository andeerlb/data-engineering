services:
  pulsar:
    image: apachepulsar/pulsar:latest
    container_name: pulsar
    hostname: pulsar
    restart: always
    ports:
      - "6650:6650"
      - "8080:8080"
    networks:
      - pulsar-net
    volumes:
      - ./data:/pulsar/data
    command: >
      bin/pulsar standalone
      -nss
      --advertised-address localhost
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/admin/v2/clusters"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  dekaf:
    image: visortelle/dekaf:1.1.0
    restart: always
    environment:
      DEKAF_PULSAR_WEB_URL: "http://pulsar:8080"
      DEKAF_PULSAR_BROKER_URL: "pulsar://pulsar:6650"
    volumes:
      - dekaf-library:/dekaf/data/library
    ports:
      - "8090:8090"
    networks:
      - pulsar-net

  pulsar-manager:
    image: apachepulsar/pulsar-manager:latest
    container_name: pulsar-manager
    restart: always
    ports:
      - "9527:9527"
      - "7750:7750"
    environment:
      SPRING_CONFIGURATION_FILE: /pulsar-manager/pulsar-manager/application.properties
      ENV_REDIRECT_HOST: "localhost"
      ENV_REDIRECT_PORT: "9527"
      ENV_DRIVER_CLASS_NAME: "org.h2.Driver"
      ENV_URL: "jdbc:h2:file:/pulsar-manager/data/pulsar-manager"
      ENV_USERNAME: "sa"
      ENV_PASSWORD: "sa"
      ENV_LOG_LEVEL: "INFO"
      PULSAR_MANAGER_OPTS: >
        -Dpulsar.manager.service.url=http://pulsar:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./pulsar-manager-data:/pulsar-manager/data
    depends_on:
      pulsar:
        condition: service_healthy
    networks:
      - pulsar-net

  pulsar-manager-init:
    image: curlimages/curl:latest
    volumes:
      - ./init-pulsar-manager.sh:/init.sh
    entrypoint: ["/bin/sh", "/init.sh"]
    depends_on:
      pulsar-manager:
        condition: service_started
    networks:
      - pulsar-net

networks:
  pulsar-net:
    driver: bridge

volumes:
  dekaf-library: